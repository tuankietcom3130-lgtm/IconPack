name: Build submitted icons

on:
  workflow_dispatch:

  pull_request_target:
    types:
      - opened
      - edited
      - reopened
      - synchronize
    paths:
      - submissions/**/*.svg

concurrency:
  group: icon-submission-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Convert SVG submissions
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      VALKYRIE_VERSION: 1.2.0
      VALKYRIE_SHA256: 58bd9d270706163e1b1c2ac9947e6a200ded302c638ec356ac3c126bf996588c
      SVG2VECTOR_VERSION: 2.9.1
      ICON_PACKAGE_NAME: moe.rukamori.iconpack
      ICON_RANDOM_DIGITS: 6

    steps:
      - name: Require PAT
        env:
          ICON_PACK_PAT: ${{ secrets.ICON_PACK_PAT }}
        run: |
          if [ -z "$ICON_PACK_PAT" ]; then
            echo "::error::Repository secret ICON_PACK_PAT is required."
            exit 1
          fi

      - name: Checkout trusted workflow source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: trusted
          persist-credentials: false

      - name: Checkout pull request head
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          path: submission
          persist-credentials: false

      - name: Fetch trusted base revision
        working-directory: submission
        env:
          BASE_REPOSITORY: ${{ github.repository }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          git remote add upstream "https://github.com/${BASE_REPOSITORY}.git"
          git fetch --no-tags --depth=1 upstream "$BASE_SHA"

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pinned SVG to VectorDrawable converter
        run: npm install --global "svg2vectordrawable@${SVG2VECTOR_VERSION}"

      - name: Install pinned Valkyrie CLI
        run: |
          curl --fail --location --silent --show-error \
            --output /tmp/valkyrie.zip \
            "https://github.com/ComposeGears/Valkyrie/releases/download/cli-${VALKYRIE_VERSION}/valkyrie-cli-${VALKYRIE_VERSION}.zip"
          echo "${VALKYRIE_SHA256}  /tmp/valkyrie.zip" | sha256sum --check --strict
          unzip -q /tmp/valkyrie.zip -d /tmp/valkyrie
          chmod +x /tmp/valkyrie/bin/valkyrie
          /tmp/valkyrie/bin/valkyrie --version

      - name: Validate and convert submissions
        working-directory: submission
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          python3 ../trusted/.github/scripts/process_icon_submission.py \
            --mode pull-request \
            --event-path "$GITHUB_EVENT_PATH" \
            --base-sha "$BASE_SHA" \
            --valkyrie /tmp/valkyrie/bin/valkyrie \
            --s2v "$(command -v s2v)" \
            --package-name "$ICON_PACKAGE_NAME" \
            --random-digits "$ICON_RANDOM_DIGITS"

      - name: Commit generated vectors and metadata
        working-directory: submission
        env:
          ICON_PACK_PAT: ${{ secrets.ICON_PACK_PAT }}
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
          HEAD_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name }}
        run: |
          if git diff --quiet && [ -z "$(git status --short)" ]; then
            echo "No generated changes to commit."
            exit 0
          fi

          pat_user_json="$(curl --fail --silent --show-error \
            --header "Authorization: Bearer ${ICON_PACK_PAT}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/user)"
          pat_login="$(printf '%s' "$pat_user_json" | python3 -c 'import json,sys; print(json.load(sys.stdin)["login"])')"
          pat_id="$(printf '%s' "$pat_user_json" | python3 -c 'import json,sys; print(json.load(sys.stdin)["id"])')"

          git config user.name "$pat_login"
          git config user.email "${pat_id}+${pat_login}@users.noreply.github.com"
          git add metadata.json pack xml submissions
          git commit -m "build(icon-pack): generate submitted vectors"
          git remote set-url origin "https://x-access-token:${ICON_PACK_PAT}@github.com/${HEAD_REPOSITORY}.git"
          git push origin "HEAD:${HEAD_BRANCH}"

  rebuild:
    name: Rebuild and reconcile icon pack
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      VALKYRIE_VERSION: 1.2.0
      VALKYRIE_SHA256: 58bd9d270706163e1b1c2ac9947e6a200ded302c638ec356ac3c126bf996588c
      SVG2VECTOR_VERSION: 2.9.1
      ICON_PACKAGE_NAME: moe.rukamori.iconpack
      ICON_RANDOM_DIGITS: 6

    steps:
      - name: Require branch and PAT
        env:
          ICON_PACK_PAT: ${{ secrets.ICON_PACK_PAT }}
          REF_TYPE: ${{ github.ref_type }}
        run: |
          if [ "$REF_TYPE" != "branch" ]; then
            echo "::error::Manual rebuilds must run against a branch."
            exit 1
          fi
          if [ -z "$ICON_PACK_PAT" ]; then
            echo "::error::Repository secret ICON_PACK_PAT is required."
            exit 1
          fi

      - name: Checkout selected branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pinned SVG to VectorDrawable converter
        run: npm install --global "svg2vectordrawable@${SVG2VECTOR_VERSION}"

      - name: Install pinned Valkyrie CLI
        run: |
          curl --fail --location --silent --show-error \
            --output /tmp/valkyrie.zip \
            "https://github.com/ComposeGears/Valkyrie/releases/download/cli-${VALKYRIE_VERSION}/valkyrie-cli-${VALKYRIE_VERSION}.zip"
          echo "${VALKYRIE_SHA256}  /tmp/valkyrie.zip" | sha256sum --check --strict
          unzip -q /tmp/valkyrie.zip -d /tmp/valkyrie
          chmod +x /tmp/valkyrie/bin/valkyrie
          /tmp/valkyrie/bin/valkyrie --version

      - name: Rebuild and reconcile icons
        run: |
          python3 .github/scripts/process_icon_submission.py \
            --mode rebuild \
            --valkyrie /tmp/valkyrie/bin/valkyrie \
            --s2v "$(command -v s2v)" \
            --package-name "$ICON_PACKAGE_NAME" \
            --random-digits "$ICON_RANDOM_DIGITS"

      - name: Commit reconciled icon pack
        env:
          ICON_PACK_PAT: ${{ secrets.ICON_PACK_PAT }}
          TARGET_BRANCH: ${{ github.ref_name }}
        run: |
          if git diff --quiet && [ -z "$(git status --short)" ]; then
            echo "No rebuilt changes to commit."
            exit 0
          fi

          pat_user_json="$(curl --fail --silent --show-error \
            --header "Authorization: Bearer ${ICON_PACK_PAT}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/user)"
          pat_login="$(printf '%s' "$pat_user_json" | python3 -c 'import json,sys; print(json.load(sys.stdin)["login"])')"
          pat_id="$(printf '%s' "$pat_user_json" | python3 -c 'import json,sys; print(json.load(sys.stdin)["id"])')"

          git config user.name "$pat_login"
          git config user.email "${pat_id}+${pat_login}@users.noreply.github.com"
          git add metadata.json pack xml submissions
          git commit -m "build(icon-pack): rebuild and reconcile vectors"
          git remote set-url origin "https://x-access-token:${ICON_PACK_PAT}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin "HEAD:${TARGET_BRANCH}"
